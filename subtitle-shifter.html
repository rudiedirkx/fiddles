<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Better Subtitle Shifter</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f4f5;
            color: #18181b;
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .container {
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        h1 { margin-top: 0; font-size: 1.5rem; }
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            padding: 1rem;
            background: #fafafa;
            border: 1px solid #e4e4e7;
            border-radius: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        input[type="file"], .search-box {
            padding: 0.5rem;
            border: 1px solid #d4d4d8;
            border-radius: 4px;
        }
        .search-box {
            flex-grow: 1;
            font-size: 1rem;
            min-width: 200px;
        }
        button {
            padding: 0.5rem 1rem;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover:not(:disabled) { background-color: #2563eb; }
        button:disabled { background-color: #93c5fd; cursor: not-allowed; }
        #downloadBtn { background-color: #10b981; }
        #downloadBtn:hover:not(:disabled) { background-color: #059669; }
        #downloadBtn:disabled { background-color: #6ee7b7; }

        #counter {
            font-weight: 600;
            color: #52525b;
            white-space: nowrap;
        }
        #errorMsg {
            display: none;
            background-color: #fef2f2;
            color: #b91c1c;
            padding: 1rem;
            border-left: 4px solid #ef4444;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-weight: 500;
        }
        .graph-container {
            display: none;
            margin-bottom: 1rem;
            padding: 1rem;
            background: #fafafa;
            border: 1px solid #e4e4e7;
            border-radius: 6px;
        }
        .graph-title {
            font-size: 0.85rem;
            color: #52525b;
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        canvas {
            width: 100%;
            height: 60px;
            background: #ffffff;
            border: 1px solid #d4d4d8;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            display: none;
        }
        th, td {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 1px solid #e4e4e7;
        }
        th {
            background-color: #f4f4f5;
            font-weight: 600;
        }
        .sub-text {
            color: #52525b;
            white-space: pre-line;
        }
        .time-input {
            padding: 0.4rem;
            border: 1px solid #d4d4d8;
            border-radius: 4px;
            font-family: monospace;
            width: 100px;
        }
        .filled-row {
            background-color: #eff6ff;
        }
        .search-match {
            background-color: #fef08a !important;
        }
        .calc-time {
            font-family: monospace;
            color: #059669;
            font-weight: 600;
        }
        .shift-badge {
            font-size: 0.75rem;
            color: #71717a;
            margin-left: 0.5rem;
            font-weight: normal;
        }

        /* Drag and Drop Overlay */
        #dragOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(59, 130, 246, 0.1);
            border: 6px dashed #3b82f6;
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #3b82f6;
            pointer-events: none; /* Let the drop event pass through */
        }
        body.dragging #dragOverlay {
            display: flex;
        }
    </style>
</head>
<body>

    <div id="dragOverlay">Drop .srt file anywhere</div>

    <div class="container">
        <h1>Better Subtitle Shifter</h1>

        <div class="controls">
            <input type="file" id="srtFile" accept=".srt">
            <input type="search" id="searchBox" class="search-box" placeholder="Search subtitle text to filter (Press '/' to focus)..." disabled>
            <div id="counter">0 / 0 filled</div>
            <button id="calcBtn" disabled>Calculate</button>
            <button id="downloadBtn" disabled>Download</button>
        </div>

        <div id="errorMsg"></div>

        <div class="graph-container" id="graphContainer">
            <div class="graph-title">Shift Offset vs Time</div>
            <canvas id="shiftGraph" width="1000" height="60"></canvas>
        </div>

        <table id="subTable">
            <thead>
                <tr>
                    <th style="width: 130px;">Original Time</th>
                    <th style="width: 130px;">Actual Time</th>
                    <th style="width: 200px;">New Time</th>
                    <th>Subtitle Text</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <script>
        const fileInput = document.getElementById('srtFile');
        const searchBox = document.getElementById('searchBox');
        const calcBtn = document.getElementById('calcBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorMsg = document.getElementById('errorMsg');
        const subTable = document.getElementById('subTable');
        const tableBody = document.getElementById('tableBody');
        const counterDisplay = document.getElementById('counter');
        const graphContainer = document.getElementById('graphContainer');
        const shiftGraph = document.getElementById('shiftGraph');

        let srtBlocksData = [];
        let modifiedSrtText = "";

        // --- Drag and Drop ---
        let dragTimer;
        document.addEventListener('dragover', function(e) {
            e.preventDefault();
            document.body.classList.add('dragging');
            clearTimeout(dragTimer);
        });

        document.addEventListener('dragleave', function(e) {
            e.preventDefault();
            dragTimer = setTimeout(() => {
                document.body.classList.remove('dragging');
            }, 50);
        });

        document.addEventListener('drop', function(e) {
            e.preventDefault();
            document.body.classList.remove('dragging');

            const files = e.dataTransfer.files;
            if (files && files.length > 0) {
                if (files[0].name.toLowerCase().endsWith('.srt')) {
                    // Direct assignment to the file input
                    fileInput.files = files;
                    // Trigger the change event so the existing logic takes over
                    fileInput.dispatchEvent(new Event('change'));
                } else {
                    showError("Please drop a valid .srt file.");
                }
            }
        });

        // --- Keyboard Shortcuts ---
        document.addEventListener('keydown', function(e) {
            if (e.key === '/' && document.activeElement === document.body) {
                if (!searchBox.disabled) {
                    e.preventDefault();
                    searchBox.focus();
                }
            }
        });

        function timeToMs(timeStr) {
            let [time, msStr] = timeStr.split(',');
            msStr = msStr || '000';
            let [hh, mm, ss] = time.split(':').map(Number);
            return (hh * 3600000) + (mm * 60000) + (ss * 1000) + Number(msStr);
        }

        function msToTime(duration) {
            let ms = Math.floor((duration % 1000));
            let s = Math.floor((duration / 1000) % 60);
            let m = Math.floor((duration / (1000 * 60)) % 60);
            let h = Math.floor((duration / (1000 * 60 * 60)));

            const pad = (n, len=2) => n.toString().padStart(len, '0');
            return `${pad(h)}:${pad(m)}:${pad(s)},${pad(ms, 3)}`;
        }

        function roundSRTTime(timeStr) {
            const [time, msStr] = timeStr.split(',');
            let [hh, mm, ss] = time.split(':').map(Number);
            const ms = Number(msStr);

            if (ms >= 500) {
                ss += 1;
                if (ss >= 60) {
                    ss -= 60;
                    mm += 1;
                    if (mm >= 60) {
                        mm -= 60;
                        hh += 1;
                    }
                }
            }
            const pad = (num) => num.toString().padStart(2, '0');
            return `${pad(hh)}:${pad(mm)}:${pad(ss)}`;
        }

        function showError(msg) {
            errorMsg.innerText = msg;
            errorMsg.style.display = msg ? 'block' : 'none';
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                processSRT(e.target.result);
                searchBox.disabled = false;
                calcBtn.disabled = false;
                downloadBtn.disabled = true;
                subTable.style.display = 'table';
                graphContainer.style.display = 'none';
                showError('');
                searchBox.focus();
            };
            reader.readAsText(file);
        });

        function processSRT(srtText) {
            tableBody.innerHTML = '';
            srtBlocksData = [];
            const blocks = srtText.replace(/\r\n/g, '\n').trim().split(/\n{2,}/);

            blocks.forEach((block, blockIndex) => {
                const lines = block.split('\n');
                if (lines.length >= 3) {
                    const timeLine = lines[1];
                    const match = timeLine.match(/(\d{2}:\d{2}:\d{2},\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2},\d{3})/);

                    if (match) {
                        const originalStart = match[1];
                        const originalEnd = match[2];
                        const text = lines.slice(2).join('\n');
                        const startMs = timeToMs(originalStart);
                        const endMs = timeToMs(originalEnd);

                        srtBlocksData.push({
                            isValid: true,
                            idLine: lines[0],
                            startMs: startMs,
                            endMs: endMs,
                            text: text,
                            raw: block
                        });

                        const tr = document.createElement('tr');
                        tr.dataset.searchText = text.toLowerCase();
                        tr.dataset.startMs = startMs;
                        tr.dataset.blockIndex = blockIndex;

                        tr.innerHTML = `
                            <td><code style="color: #3f3f46;">${originalStart}</code></td>
                            <td>
                                <input type="text" class="time-input" data-orig="${roundSRTTime(originalStart)}">
                            </td>
                            <td><span class="calc-time">-</span><span class="shift-badge"></span></td>
                            <td class="sub-text">${text}</td>
                        `;

                        const inputField = tr.querySelector('.time-input');

                        inputField.addEventListener('focus', function() {
                            if (!this.dataset.touched) {
                                this.value = this.dataset.orig;
                                this.dataset.touched = 'true';
                                this.dispatchEvent(new Event('input'));

                                setTimeout(() => {
                                    this.setSelectionRange(this.value.length, this.value.length);
                                }, 0);
                            }
                        });

                        inputField.addEventListener('input', function() {
                            if (this.value.trim() !== '') {
                                tr.classList.add('filled-row');
                            } else {
                                tr.classList.remove('filled-row');
                                this.dataset.touched = '';
                            }
                            updateCounter();
                            showError('');
                            downloadBtn.disabled = true;
                        });

                        tableBody.appendChild(tr);
                    } else {
                        srtBlocksData.push({ isValid: false, raw: block });
                    }
                } else {
                    srtBlocksData.push({ isValid: false, raw: block });
                }
            });
            updateCounter();
        }

        function updateCounter() {
            const total = tableBody.querySelectorAll('tr').length;
            const filled = tableBody.querySelectorAll('.filled-row').length;
            counterDisplay.innerText = `${filled} / ${total} filled`;
        }

        searchBox.addEventListener('input', filterTable);

        function filterTable() {
            const query = searchBox.value.toLowerCase().trim();
            const rows = Array.from(tableBody.querySelectorAll('tr'));

            if (query === '') {
                rows.forEach(row => {
                    row.style.display = '';
                    row.classList.remove('search-match');
                });
                return;
            }

            const visibleIndices = new Set();

            rows.forEach((row, index) => {
                const isFilled = row.classList.contains('filled-row');
                const matchesSearch = row.dataset.searchText.includes(query);

                row.classList.remove('search-match');

                if (matchesSearch) {
                    row.classList.add('search-match');
                    visibleIndices.add(index);
                    if (index > 0) visibleIndices.add(index - 1);
                    if (index < rows.length - 1) visibleIndices.add(index + 1);
                } else if (isFilled) {
                    visibleIndices.add(index);
                }
            });

            rows.forEach((row, index) => {
                row.style.display = visibleIndices.has(index) ? '' : 'none';
            });
        }

        // --- Calculation & Graph Logic ---
        calcBtn.addEventListener('click', function() {
            const filledRows = tableBody.querySelectorAll('.filled-row');

            if (filledRows.length === 0) {
                showError("Error: You must fill at least 1 Actual Time to calculate shifts.");
                return;
            }

            showError('');

            let points = Array.from(filledRows).map(row => {
                const origMs = Number(row.dataset.startMs);
                const actualInput = row.querySelector('.time-input').value.trim();
                const actualMs = timeToMs(actualInput);
                return { t: origMs, T: actualMs };
            });

            points.sort((a, b) => a.t - b.t);

            for (let i = 0; i < points.length - 1; i++) {
                if (points[i].t === points[i+1].t) {
                    showError("Error: Two of your filled times share the exact same original timestamp. Please fix or remove one.");
                    return;
                }
            }

            function getShiftedMs(t_old) {
                if (points.length === 1) {
                    return Math.max(0, t_old + (points[0].T - points[0].t));
                }

                let p1, p2;
                if (t_old <= points[0].t) {
                    p1 = points[0]; p2 = points[1];
                } else if (t_old >= points[points.length - 1].t) {
                    p1 = points[points.length - 2]; p2 = points[points.length - 1];
                } else {
                    for (let i = 0; i < points.length - 1; i++) {
                        if (t_old >= points[i].t && t_old <= points[i+1].t) {
                            p1 = points[i]; p2 = points[i+1];
                            break;
                        }
                    }
                }
                const scale = (p2.T - p1.T) / (p2.t - p1.t);
                return Math.max(0, p1.T + (t_old - p1.t) * scale);
            }

            const allRows = tableBody.querySelectorAll('tr');
            allRows.forEach(row => {
                const t_old = Number(row.dataset.startMs);
                const t_newMs = getShiftedMs(t_old);

                const shiftDiff = (t_newMs - t_old) / 1000;
                const sign = shiftDiff >= 0 ? '+' : '';

                row.querySelector('.calc-time').innerText = msToTime(Math.round(t_newMs));
                row.querySelector('.shift-badge').innerText = `(${sign}${shiftDiff.toFixed(2)}s)`;
            });

            modifiedSrtText = srtBlocksData.map(block => {
                if (!block.isValid) return block.raw;

                const newStartMs = getShiftedMs(block.startMs);
                const newEndMs = getShiftedMs(block.endMs);

                return `${block.idLine}\n${msToTime(Math.round(newStartMs))} --> ${msToTime(Math.round(newEndMs))}\n${block.text}`;
            }).join('\n\n');

            drawGraph(getShiftedMs);
            downloadBtn.disabled = false;
        });

        function drawGraph(getShiftedMs) {
            graphContainer.style.display = 'block';
            const ctx = shiftGraph.getContext('2d');
            const w = shiftGraph.width;
            const h = shiftGraph.height;
            ctx.clearRect(0, 0, w, h);

            const validRows = Array.from(tableBody.querySelectorAll('tr'));
            if (validRows.length === 0) return;

            const minT = Number(validRows[0].dataset.startMs);
            const maxT = Number(validRows[validRows.length - 1].dataset.startMs);
            const duration = maxT - minT || 1;

            let shifts = [];
            validRows.forEach(row => {
                const origT = Number(row.dataset.startMs);
                const newT = getShiftedMs(origT);
                shifts.push({ x: origT, y: newT - origT });
            });

            const minShift = Math.min(...shifts.map(s => s.y));
            const maxShift = Math.max(...shifts.map(s => s.y));
            const shiftRange = maxShift - minShift || 1;

            ctx.beginPath();
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 2;

            shifts.forEach((p, i) => {
                const px = ((p.x - minT) / duration) * w;
                let py;
                if (maxShift === minShift) {
                    py = h / 2;
                } else {
                    py = h - (((p.y - minShift) / shiftRange) * (h * 0.8) + (h * 0.1));
                }

                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            });
            ctx.stroke();
        }

        downloadBtn.addEventListener('click', function() {
            if (!modifiedSrtText) return;
            const blob = new Blob([modifiedSrtText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');

            let origName = fileInput.files[0].name;
            let newName = origName.replace(/\.srt$/i, '') + '_shifted.srt';

            a.href = url;
            a.download = newName;
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
